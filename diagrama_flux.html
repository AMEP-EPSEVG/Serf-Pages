<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Arquitectural — SERF</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #2f81f7;
    --green: #3fb950;
    --purple: #d2a8ff;
    --orange: #ffa657;
    --red: #ff7b72;
    --text: #e6edf3;
    --muted: #8b949e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  header h1 span { color: var(--accent); }
  header p {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 6px;
  }

  svg {
    width: 100%;
    max-width: 780px;
    height: auto;
    overflow: visible;
  }

  /* animate arrows */
  .flow-arrow {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: dash .5s ease forwards;
  }
  @keyframes dash { to { stroke-dashoffset: 0; } }

  .node { opacity: 0; animation: popin .3s ease forwards; }
  @keyframes popin { to { opacity: 1; } }
</style>
</head>
<body>

<header>
  <h1>SERF<br><span>Diagrama de Flux Arquitectural</span></h1>
  <p>Cicle de petició HTTP · Patró MVC · Ruby on Rails</p>
</header>

<svg viewBox="0 0 740 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2f81f7"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d2a8ff"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff7b72"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ─── BACKGROUND LANE LABELS ─── -->
  <text x="18" y="108" font-family="'JetBrains Mono'" font-size="9" fill="#2f81f7" opacity=".5" letter-spacing="2" transform="rotate(-90,18,108)">CLIENT</text>
  <text x="18" y="270" font-family="'JetBrains Mono'" font-size="9" fill="#3fb950" opacity=".5" letter-spacing="2" transform="rotate(-90,18,270)">ROUTER</text>
  <text x="18" y="420" font-family="'JetBrains Mono'" font-size="9" fill="#d2a8ff" opacity=".5" letter-spacing="2" transform="rotate(-90,18,420)">CONTROLLER</text>
  <text x="18" y="590" font-family="'JetBrains Mono'" font-size="9" fill="#ffa657" opacity=".5" letter-spacing="2" transform="rotate(-90,18,590)">MODEL</text>
  <text x="18" y="760" font-family="'JetBrains Mono'" font-size="9" fill="#ff7b72" opacity=".5" letter-spacing="2" transform="rotate(-90,18,760)">DB</text>
  <text x="18" y="890" font-family="'JetBrains Mono'" font-size="9" fill="#3fb950" opacity=".5" letter-spacing="2" transform="rotate(-90,18,890)">VIEW</text>

  <!-- Subtle lane separators -->
  <line x1="40" y1="155" x2="720" y2="155" stroke="#30363d" stroke-width=".5" stroke-dasharray="4,4"/>
  <line x1="40" y1="305" x2="720" y2="305" stroke="#30363d" stroke-width=".5" stroke-dasharray="4,4"/>
  <line x1="40" y1="490" x2="720" y2="490" stroke="#30363d" stroke-width=".5" stroke-dasharray="4,4"/>
  <line x1="40" y1="660" x2="720" y2="660" stroke="#30363d" stroke-width=".5" stroke-dasharray="4,4"/>
  <line x1="40" y1="820" x2="720" y2="820" stroke="#30363d" stroke-width=".5" stroke-dasharray="4,4"/>

  <!-- ══════════════════════════════ NODES ══════════════════════════════ -->

  <!-- 1. CLIENT -->
  <g class="node" style="animation-delay:.05s">
    <rect x="270" y="30" width="200" height="64" rx="10" fill="#161b22" stroke="#2f81f7" stroke-width="1.5"/>
    <text x="370" y="56" text-anchor="middle" font-family="'Syne'" font-size="13" font-weight="700" fill="#79c0ff">Usuari / Client</text>
    <text x="370" y="74" text-anchor="middle" font-family="'JetBrains Mono'" font-size="10" fill="#8b949e">Navegador · PDA · Mòbil</text>
    <!-- role badges -->
    <rect x="282" y="82" width="56" height="14" rx="4" fill="rgba(47,129,247,.15)" stroke="rgba(47,129,247,.3)" stroke-width=".8"/>
    <text x="310" y="92" text-anchor="middle" font-family="'JetBrains Mono'" font-size="8" fill="#79c0ff">admin</text>
    <rect x="344" y="82" width="52" height="14" rx="4" fill="rgba(47,129,247,.15)" stroke="rgba(47,129,247,.3)" stroke-width=".8"/>
    <text x="370" y="92" text-anchor="middle" font-family="'JetBrains Mono'" font-size="8" fill="#79c0ff">cuiner</text>
    <rect x="402" y="82" width="58" height="14" rx="4" fill="rgba(47,129,247,.15)" stroke="rgba(47,129,247,.3)" stroke-width=".8"/>
    <text x="431" y="92" text-anchor="middle" font-family="'JetBrains Mono'" font-size="8" fill="#79c0ff">cambrer</text>
  </g>

  <!-- Arrow 1→2 -->
  <g style="animation-delay:.15s">
    <line class="flow-arrow" x1="370" y1="97" x2="370" y2="160" stroke="#2f81f7" stroke-width="1.5" marker-end="url(#arr-blue)" style="animation-delay:.15s"/>
    <rect x="305" y="114" width="130" height="16" rx="4" fill="#0d1117"/>
    <text x="370" y="125" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">GET/POST HTTP Request</text>
  </g>

  <!-- 2. ROUTER -->
  <g class="node" style="animation-delay:.2s">
    <rect x="250" y="168" width="240" height="56" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="370" y="192" text-anchor="middle" font-family="'Syne'" font-size="13" font-weight="700" fill="#7ee787">Rails Router</text>
    <text x="370" y="210" text-anchor="middle" font-family="'JetBrains Mono'" font-size="10" fill="#8b949e">config/routes.rb · RESTful</text>
  </g>

  <!-- Auth branch: Router → Middleware -->
  <g style="animation-delay:.27s">
    <path class="flow-arrow" d="M490,196 Q580,196 580,240" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)" style="animation-delay:.27s"/>
    <text x="546" y="210" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">Auth check</text>
    <!-- Auth middleware box -->
    <rect x="540" y="248" width="150" height="44" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="615" y="268" text-anchor="middle" font-family="'Syne'" font-size="11" font-weight="700" fill="#e6edf3">Middleware</text>
    <text x="615" y="283" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">Autenticació · RBAC</text>
    <!-- back to controller -->
    <path d="M580,292 Q580,340 490,360" fill="none" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
    <text x="568" y="330" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">pass</text>
  </g>

  <!-- Arrow 2→3 -->
  <g style="animation-delay:.3s">
    <line class="flow-arrow" x1="370" y1="224" x2="370" y2="318" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)" style="animation-delay:.3s"/>
    <rect x="305" y="249" width="130" height="16" rx="4" fill="#0d1117"/>
    <text x="370" y="260" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">dispatch to controller</text>
  </g>

  <!-- 3. CONTROLLER -->
  <g class="node" style="animation-delay:.35s">
    <rect x="200" y="326" width="340" height="100" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
    <text x="370" y="350" text-anchor="middle" font-family="'Syne'" font-size="13" font-weight="700" fill="#d2a8ff">ActionController</text>
    <text x="370" y="368" text-anchor="middle" font-family="'JetBrains Mono'" font-size="10" fill="#8b949e">Menús · Plats · Ingredients · Restriccions · Usuaris</text>
    <!-- special box inside -->
    <rect x="240" y="378" width="260" height="36" rx="6" fill="rgba(210,168,255,.08)" stroke="rgba(210,168,255,.3)" stroke-width="1"/>
    <text x="370" y="394" text-anchor="middle" font-family="'Syne'" font-size="11" font-weight="600" fill="#d2a8ff">⚡ Motor de Suggeriments</text>
    <text x="370" y="408" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">SuggestionService · filtre restriccions</text>
  </g>

  <!-- Arrow 3→4 -->
  <g style="animation-delay:.45s">
    <line class="flow-arrow" x1="370" y1="426" x2="370" y2="500" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#arr-purple)" style="animation-delay:.45s"/>
    <rect x="295" y="449" width="152" height="16" rx="4" fill="#0d1117"/>
    <text x="370" y="460" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">ActiveRecord query</text>
  </g>

  <!-- 4. MODEL -->
  <g class="node" style="animation-delay:.5s">
    <rect x="170" y="508" width="400" height="90" rx="10" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
    <text x="370" y="532" text-anchor="middle" font-family="'Syne'" font-size="13" font-weight="700" fill="#ffa657">ActiveRecord Models</text>
    <!-- mini model pills -->
    <rect x="190" y="544" width="64" height="20" rx="5" fill="rgba(255,166,87,.1)" stroke="rgba(255,166,87,.3)" stroke-width=".8"/>
    <text x="222" y="557" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#ffa657">Menú</text>
    <rect x="264" y="544" width="56" height="20" rx="5" fill="rgba(255,166,87,.1)" stroke="rgba(255,166,87,.3)" stroke-width=".8"/>
    <text x="292" y="557" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#ffa657">Plat</text>
    <rect x="330" y="544" width="80" height="20" rx="5" fill="rgba(255,166,87,.1)" stroke="rgba(255,166,87,.3)" stroke-width=".8"/>
    <text x="370" y="557" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#ffa657">Ingredient</text>
    <rect x="420" y="544" width="82" height="20" rx="5" fill="rgba(255,166,87,.1)" stroke="rgba(255,166,87,.3)" stroke-width=".8"/>
    <text x="461" y="557" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#ffa657">Restricció</text>
    <text x="370" y="585" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9.5" fill="#8b949e">Validacions · Callbacks · Associacions · Scopes</text>
  </g>

  <!-- Arrow 4→5 -->
  <g style="animation-delay:.58s">
    <line class="flow-arrow" x1="370" y1="598" x2="370" y2="668" stroke="#ffa657" stroke-width="1.5" marker-end="url(#arr-orange)" style="animation-delay:.58s"/>
    <rect x="296" y="621" width="148" height="16" rx="4" fill="#0d1117"/>
    <text x="370" y="632" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">SQL · claus foranes</text>
  </g>

  <!-- 5. DATABASE -->
  <g class="node" style="animation-delay:.63s">
    <!-- cylinder shape -->
    <ellipse cx="370" cy="686" rx="110" ry="18" fill="#1c2333" stroke="#ff7b72" stroke-width="1.5"/>
    <rect x="260" y="686" width="220" height="60" fill="#161b22" stroke="#ff7b72" stroke-width="1.5" stroke-top="none"/>
    <line x1="260" y1="686" x2="260" y2="746" stroke="#ff7b72" stroke-width="1.5"/>
    <line x1="480" y1="686" x2="480" y2="746" stroke="#ff7b72" stroke-width="1.5"/>
    <ellipse cx="370" cy="746" rx="110" ry="18" fill="#161b22" stroke="#ff7b72" stroke-width="1.5"/>
    <ellipse cx="370" cy="686" rx="110" ry="18" fill="#1c2333" stroke="#ff7b72" stroke-width="1.5"/>
    <text x="370" y="714" text-anchor="middle" font-family="'Syne'" font-size="13" font-weight="700" fill="#ff7b72">MySQL / MariaDB</text>
    <text x="370" y="732" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9.5" fill="#8b949e">menus · plats · ingredients</text>
    <text x="370" y="745" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9.5" fill="#8b949e">restriccions · usuaris · plat_ingredients</text>
  </g>

  <!-- Arrow 5→4 return (right side) -->
  <g style="animation-delay:.7s">
    <path class="flow-arrow" d="M480,716 Q530,716 530,550 Q530,490 490,470" fill="none" stroke="#ff7b72" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-red)" style="animation-delay:.7s"/>
    <text x="536" y="610" font-family="'JetBrains Mono'" font-size="9" fill="#ff7b72">ResultSet</text>
  </g>

  <!-- Arrow model→controller return (right) -->
  <g style="animation-delay:.75s">
    <path d="M510,470 Q555,470 555,390 Q555,326 540,326" fill="none" stroke="#ffa657" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
    <text x="558" y="415" font-family="'JetBrains Mono'" font-size="9" fill="#ffa657">@objects</text>
  </g>

  <!-- Arrow 3→6 (controller → view) -->
  <g style="animation-delay:.8s">
    <line class="flow-arrow" x1="370" y1="766" x2="370" y2="836" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)" style="animation-delay:.8s"/>
    <rect x="300" y="790" width="140" height="16" rx="4" fill="#0d1117"/>
    <text x="370" y="801" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#8b949e">render view / redirect</text>
  </g>

  <!-- 6. VIEW -->
  <g class="node" style="animation-delay:.85s">
    <rect x="200" y="844" width="340" height="60" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="370" y="869" text-anchor="middle" font-family="'Syne'" font-size="13" font-weight="700" fill="#7ee787">View (ERB + Hotwire)</text>
    <text x="370" y="887" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9.5" fill="#8b949e">Turbo Frames · Turbo Streams · Stimulus JS</text>
  </g>

  <!-- Arrow View→Client (left loop back) -->
  <g style="animation-delay:.92s">
    <path class="flow-arrow" d="M200,874 Q120,874 120,62 Q120,62 270,62" fill="none" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-green)" style="animation-delay:.92s"/>
    <text x="88" y="470" text-anchor="middle" font-family="'JetBrains Mono'" font-size="9" fill="#7ee787" transform="rotate(-90,88,470)">HTML Response</text>
  </g>

  <!-- Step numbers -->
  <g font-family="'JetBrains Mono'" font-size="10" font-weight="600">
    <circle cx="430" cy="128" r="9" fill="#2f81f7" opacity=".8"/><text x="430" y="132" text-anchor="middle" fill="white">1</text>
    <circle cx="430" cy="246" r="9" fill="#3fb950" opacity=".8"/><text x="430" y="250" text-anchor="middle" fill="white">2</text>
    <circle cx="430" cy="462" r="9" fill="#d2a8ff" opacity=".8"/><text x="430" y="466" text-anchor="middle" fill="white">3</text>
    <circle cx="430" cy="634" r="9" fill="#ffa657" opacity=".8"/><text x="430" y="638" text-anchor="middle" fill="white">4</text>
    <circle cx="430" cy="800" r="9" fill="#3fb950" opacity=".8"/><text x="430" y="804" text-anchor="middle" fill="white">5</text>
  </g>

</svg>

<!-- Legend -->
<div style="max-width:780px;width:100%;margin-top:24px;padding-top:16px;border-top:1px solid #30363d;display:flex;flex-wrap:wrap;gap:16px;font-family:'JetBrains Mono';font-size:0.65rem;color:#8b949e;">
  <span>① Petició HTTP</span>
  <span>② Routing + Auth</span>
  <span>③ Lògica + Suggeriments</span>
  <span>④ Consulta ORM → SQL</span>
  <span>⑤ Resposta HTML / Turbo</span>
  <span style="display:flex;align-items:center;gap:6px;margin-left:auto">
    <svg width="22" height="4"><line x1="0" y1="2" x2="22" y2="2" stroke="#8b949e" stroke-width="1.5"/></svg>flux principal
    <svg width="22" height="4" style="margin-left:8px"><line x1="0" y1="2" x2="22" y2="2" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="4,3"/></svg>retorn de dades
  </span>
</div>

</body>
</html>
