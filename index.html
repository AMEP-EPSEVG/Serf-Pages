<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERF — Documentació</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #2f81f7;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --accent5: #ffa657;
    --text: #e6edf3;
    --muted: #8b949e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 700px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .card-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .card-title {
    font-size: 1.2rem;
    font-weight: 700;
  }

  .card-desc {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    line-height: 1.6;
  }

  .card-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    align-self: flex-start;
  }
</style>
</head>
<body>
  <header>
    <h1>SERF</h1>
    <p>// documentació tècnica</p>
  </header>

  <div class="grid">
    <a class="card" href="diagrama_arquitectura.html">
      <div class="card-icon">🏗️</div>
      <div class="card-title">Arquitectura</div>
      <div class="card-desc">Visió estàtica dels components, capes i dependències del sistema.</div>
      <span class="card-tag">diagrama_arquitectura</span>
    </a>

    <a class="card" href="diagrama_flux.html">
      <div class="card-icon">🔄</div>
      <div class="card-title">Flux Arquitectural</div>
      <div class="card-desc">Seqüència de peticions i respostes entre frontend, backend i base de dades.</div>
      <span class="card-tag">diagrama_flux</span>
    </a>
  </div>
</body>
</html>
